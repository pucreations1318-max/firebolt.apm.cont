<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fire-Boltt Pro Sync</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00f2ff; --a: #7000ff; --bg: #050508; --g: rgba(255,255,255,0.05); --err: #ff3366; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Animations */
        @keyframes scan { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .header { padding: 30px; text-align: center; }
        .logo { font-size: 45px; color: var(--p); text-shadow: 0 0 20px var(--p); }

        .v-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* ⌚ Watch Radar UI */
        .radar { width: 160px; height: 160px; border: 2px solid var(--p); border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; }
        .radar.active::after { content: ""; position: absolute; inset: -10px; border: 2px solid var(--p); border-radius: 50%; animation: scan 1.5s infinite; }
        .inner-circle { width: 120px; height: 120px; background: rgba(0,242,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        .watch-ico { font-size: 50px; transition: 0.5s; }
        .glow { color: var(--p); text-shadow: 0 0 25px var(--p); }

        .info-card { width: 85%; background: var(--g); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 25px; margin-top: 40px; text-align: center; }
        #status { font-size: 18px; font-weight: bold; color: var(--p); margin-bottom: 5px; }
        #details { font-size: 13px; opacity: 0.5; letter-spacing: 1px; }

        .controls { padding: 40px; display: flex; flex-direction: column; gap: 15px; }
        .btn { width: 100%; padding: 18px; border-radius: 50px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s; }
        .btn-p { background: linear-gradient(45deg, var(--p), var(--a)); color: white; box-shadow: 0 10px 20px rgba(0,242,255,0.2); }
        .btn-r { background: #111; border: 1px solid var(--p); color: var(--p); display: none; }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 12px 30px; border-radius: 50px; font-weight: bold; display: none; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-bolt-lightning logo"></i>
        <h2 style="letter-spacing: 2px; margin-top: 10px;">FB SYNC PRO</h2>
    </div>

    <div class="v-container">
        <div class="radar" id="radarRing">
            <div class="inner-circle">
                <i class="fa-solid fa-clock watch-ico" id="watchIco"></i>
            </div>
        </div>

        <div class="info-card">
            <div id="status">Standby Mode</div>
            <div id="details">Ready to connect Fire-Boltt</div>
        </div>
    </div>

    <div class="controls">
        <button id="pBtn" class="btn btn-p" onclick="startSync()">
            <i class="fa-solid fa-magnifying-glass"></i> SEARCH WATCH
        </button>
        <button id="rBtn" class="btn btn-r" onclick="startSync()">
            <i class="fa-solid fa-rotate-right"></i> TRY AGAIN
        </button>
    </div>

    <div id="toast"></div>

    <script>
        let myDevice = null;
        let timer = null;

        async function startSync() {
            const status = document.getElementById('status');
            const details = document.getElementById('details');
            const radar = document.getElementById('radarRing');
            const ico = document.getElementById('watchIco');
            const pBtn = document.getElementById('pBtn');
            const rBtn = document.getElementById('rBtn');

            try {
                // Reset UI for scanning
                status.innerText = "Scanning...";
                status.style.color = "var(--p)";
                details.innerText = "Looking for FB BGR001...";
                radar.classList.add('active');
                pBtn.disabled = true;
                pBtn.style.opacity = "0.5";
                rBtn.style.display = "none";

                // Timeout of 20 seconds
                timer = setTimeout(() => {
                    if(!myDevice) stopWithTimeout();
                }, 20000);

                // Specific filtering for Fire-Boltt
                const device = await navigator.bluetooth.requestDevice({
                    filters: [
                        { namePrefix: 'FB' }, 
                        { namePrefix: 'Fire' }
                    ],
                    optionalServices: [0xfee0, 0xfee7, 'battery_service', 'heart_rate']
                });

                clearTimeout(timer);
                status.innerText = "Connecting...";
                details.innerText = "Pairing with " + device.name;

                const server = await device.gatt.connect();
                
                // Connection Success
                myDevice = device;
                radar.classList.remove('active');
                ico.classList.add('glow');
                status.innerText = "Watch Paired ✅";
                status.style.color = "#22c55e";
                details.innerText = "Model: " + device.name;
                
                pBtn.innerHTML = '<i class="fa-solid fa-link-slash"></i> DISCONNECT';
                pBtn.disabled = false;
                pBtn.style.opacity = "1";
                pBtn.onclick = () => location.reload();

                showToast("Connected Successfully!");

            } catch (err) {
                clearTimeout(timer);
                console.error(err);
                radar.classList.remove('active');
                status.innerText = "Sync Failed";
                status.style.color = "var(--err)";
                details.innerText = "Bluetooth denied or not found.";
                rBtn.style.display = "flex";
                pBtn.style.display = "none";
            }
        }

        function stopWithTimeout() {
            document.getElementById('radarRing').classList.remove('active');
            document.getElementById('status').innerText = "Request Timed Out";
            document.getElementById('status').style.color = "var(--err)";
            document.getElementById('details').innerText = "Device not found in range.";
            document.getElementById('rBtn').style.display = "flex";
            document.getElementById('pBtn').style.display = "none";
            showToast("Watch not found!");
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
