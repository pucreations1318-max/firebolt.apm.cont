<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Sync Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00f2ff; --a: #7000ff; --bg: #050508; --g: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

        /* ✨ UI Animations */
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 0.5; } }

        /* 📱 Header */
        .header { padding: 25px; text-align: center; }
        .logo-icon { font-size: 40px; color: var(--p); text-shadow: 0 0 15px var(--p); }

        /* ⌚ Watch Pairing UI */
        .sync-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .radar-circle { width: 200px; height: 200px; border: 2px solid var(--p); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
        .radar-circle.scanning { border-style: dashed; animation: rotate 4s linear infinite; }
        .radar-inner { width: 150px; height: 150px; background: radial-gradient(circle, rgba(0,242,255,0.2) 0%, transparent 70%); border-radius: 50%; animation: pulse 2s infinite; display: flex; align-items: center; justify-content: center; }
        .watch-icon { font-size: 60px; color: white; transition: 0.5s; }
        .watch-icon.connected { color: var(--p); text-shadow: 0 0 20px var(--p); }

        /* 📊 Status Info */
        .status-box { margin-top: 30px; text-align: center; width: 80%; background: var(--g); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .status-text { color: var(--p); font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .device-name { opacity: 0.6; font-size: 14px; }

        /* 🔘 Buttons */
        .btn-group { padding: 40px; display: flex; justify-content: center; }
        .pair-btn { width: 80%; padding: 18px; border-radius: 50px; border: none; background: linear-gradient(45deg, var(--p), var(--a)); color: white; font-weight: bold; font-size: 16px; box-shadow: 0 5px 20px rgba(0,242,255,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .pair-btn:active { transform: scale(0.95); }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 10px 25px; border-radius: 50px; font-weight: bold; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-microchip logo-icon"></i>
        <h2>Fire-Boltt Sync</h2>
    </div>

    <div class="sync-container">
        <div class="radar-circle" id="radar">
            <div class="radar-inner">
                <i class="fa-solid fa-clock watch-icon" id="watchIcon"></i>
            </div>
        </div>

        <div class="status-box">
            <div class="status-text" id="status">Disconnected</div>
            <div class="device-name" id="deviceName">Searching for your watch...</div>
        </div>
    </div>

    <div class="btn-group">
        <button class="pair-btn" onclick="pairWatch()">
            <i class="fa-solid fa-bluetooth-b"></i> <span id="btnText">PAIR WATCH</span>
        </button>
    </div>

    <div id="toast"></div>

    <script>
        let connectedDevice = null;

        async function pairWatch() {
            const btn = document.querySelector('.pair-btn');
            const status = document.getElementById('status');
            const devName = document.getElementById('deviceName');
            const radar = document.getElementById('radar');
            const watchIcon = document.getElementById('watchIcon');
            const btnText = document.getElementById('btnText');

            try {
                // UI Scanning state
                radar.classList.add('scanning');
                status.innerText = "Scanning...";
                
                // Fire-Boltt અને અન્ય વોચના બ્લૂટૂથ માટે રિક્વેસ્ટ
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['battery_service', 'heart_rate']
                });

                status.innerText = "Connecting...";
                const server = await device.gatt.connect();
                
                // Success State
                connectedDevice = device;
                radar.classList.remove('scanning');
                watchIcon.classList.add('connected');
                status.innerText = "Connected ✅";
                devName.innerText = device.name || "Unknown Fire-Boltt";
                btnText.innerText = "DISCONNECT";
                btn.onclick = disconnectWatch;

                showT("Watch Paired Successfully!");

            } catch (error) {
                console.log(error);
                radar.classList.remove('scanning');
                status.innerText = "Failed";
                devName.innerText = "Could not find watch";
                showT("Bluetooth error or cancelled");
            }
        }

        function disconnectWatch() {
            if (connectedDevice && connectedDevice.gatt.connected) {
                connectedDevice.gatt.disconnect();
            }
            location.reload(); // Reset UI
        }

        function showT(m) {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
